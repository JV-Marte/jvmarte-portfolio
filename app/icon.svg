<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- paper tile (matches the site background) -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#f7f4ea" stroke="#2a2724" stroke-width="3"/>
  <!-- hand-lettered "JV." monogram, leaning like the Caveat logo -->
  <g fill="none" stroke="#2a2724" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-9 32 34)">
    <!-- J: short left serif + stem curling into a deep bottom hook -->
